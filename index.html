<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="assets/icon.png">
    <link type="text/css" rel="stylesheet" href="styles/system.css" />
    <link type="text/css" rel="stylesheet" href="styles/colors.css" />
    <link type="text/css" rel="stylesheet" href="styles/bar.css" />
    <link type="text/css" rel="stylesheet" href="styles/window.css" />
    <title>ToDo application by kostakuu</title>
</head>
<body>
    <div id="root">
        <section class="bar">
            <ul class="primary">
                <li><a href="https://kostakuu.rs" target="_blank"><img src="assets/icon.png" alt="kostakuu"/> kostakuu</a></li>
                <li><a href="https://rs.linkedin.com/in/kostakuu" target="_blank">LinkedIn</a></li>
                <li><a href="https://www.instagram.com/kostakuu" target="_blank">Instagram</a></li>
                <li><a href="https://www.facebook.com/kostakuu.blog" target="_blank">Facebook</a></li>
                <li><a href="https://twitter.com/kostakuu" target="_blank">Twitter</a></li>
            </ul>
            <ul class="secondary">
                <li><img src="assets/wifi.svg" alt="WiFi"/></li>
                <li>09:00</li>
            </ul>
        </section>
        <section class="window">
            <div class="title-bar">
                <div class="action-button close-button"></div>
                <div class="action-button minimize-button"></div>
                <div class="action-button maximize-button"></div>
                <span>ToDo application by kostakuu</span>
            </div>
            <div class="content">
                <div class="sidebar">
                    <label>
                        What are you going to do?
                        <input type="text"/>
                    </label>
                    <button>Add</button>
                </div>
                <div class="main">
                    <h1>Items</h1>
                    <div><p>Something new</p><img src="assets/delete.svg" alt="Delete"/></div>
                    <div class="completed"><p>Something completed</p><img src="assets/delete.svg" alt="Delete"/></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
